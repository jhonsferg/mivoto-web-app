<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🗳️</span>
      <span class="brand-name">MiVoto</span>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">
        {{ session.currentUser()?.firstName?.charAt(0) }}{{ session.currentUser()?.lastName?.charAt(0) }}
      </div>
      <div class="user-info">
        <span class="user-name">{{ session.currentUser()?.firstName }} {{ session.currentUser()?.lastName }}</span>
        <span class="user-role">Supervisor</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/supervisor" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 3m0 2a2 2 0 0 1 2 -2h16a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-16a2 2 0 0 1 -2 -2z" />
            <path
              d="M19 9c.513 0 .936 .463 .993 1.06l.007 .14v7.2c0 1.917 -1.249 3.484 -2.824 3.594l-.176 .006h-10c-1.598 0 -2.904 -1.499 -2.995 -3.388l-.005 -.212v-7.2c0 -.663 .448 -1.2 1 -1.2h14zm-5 2h-4l-.117 .007a1 1 0 0 0 0 1.986l.117 .007h4l.117 -.007a1 1 0 0 0 0 -1.986l-.117 -.007z" />
          </svg>
        </span>
        <span class="nav-label">Elecciones</span>
      </a>
      <a routerLink="/supervisor/settings" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Configuración</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
