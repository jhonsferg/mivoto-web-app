<label class="checkbox" [class.checkbox--disabled]="disabled">
    <input type="checkbox" class="checkbox__input" [checked]="checked" [disabled]="disabled" (change)="onChange($event)"
        (blur)="onTouched()">
    <span class="checkbox__box">
        <svg class="checkbox__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </span>
    <span class="checkbox__label">
        <ng-content></ng-content>
    </span>
</label>
