<div class="input-wrapper" [class.input-wrapper--disabled]="disabled">
    @if (label()) {
    <label [for]="id()" class="input-wrapper__label">
        {{ label() }}
        @if (required()) { <span class="input-wrapper__required">*</span> }
    </label>
    }

    <div class="input-container">
        <input [id]="id()" [type]="showPassword() ? 'text' : 'password'" [placeholder]="placeholder()"
            [disabled]="disabled" [value]="value" (input)="onInput($event)" (blur)="onBlur()" class="input-field"
            [class.input-field--error]="error()">
        <button type="button" class="toggle-btn" (click)="toggleVisibility()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            @if (showPassword()) {
            <!-- Eye Off Icon -->
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
            } @else {
            <!-- Eye Icon -->
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            }
        </button>
    </div>

    @if (error()) {
    <span class="input-wrapper__error">{{ error() }}</span>
    }
</div>
